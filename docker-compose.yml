version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_ledsflow
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS} 
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # O Coolify vai ler isso direto do seu repositório GitHub
      - ./DataBase/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: redis_ledsflow
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: ledsflow
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    volumes:
      - ledsflow_sessions:/usr/src/app/sessions
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_HOST=db
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  ledsflow_sessions: # O "cofre forte" das sessões do Baileys