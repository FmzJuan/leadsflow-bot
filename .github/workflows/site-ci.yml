name: CI-LeadsFlow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # --- INTEGRAÇÃO CONTÍNUA E TESTES ---
  test-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json # CORREÇÃO: Caminho atualizado para a raiz

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Check Code Syntax
        # CORREÇÃO: Removido o 'cd' pois agora estamos na raiz
        run: |
          node --check index.js
          node --check Engine/whatsapp.js
