name: CI-LeadsFlow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # --- INTEGRAÇÃO CONTÍNUA E TESTES ---
  test-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: leadsflow
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json # CORREÇÃO: Caminho atualizado para a raiz

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Check Code Syntax
        # CORREÇÃO: Removido o 'cd' pois agora estamos na raiz
        run: |
          node --check index.js
          node --check Engine/whatsapp.js

      - name: Run Automated Tests (Jest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leadsflow
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        # MELHORIA: Executa os testes e exibe a cobertura de código
        run: npm test -- --coverage --passWithNoTests