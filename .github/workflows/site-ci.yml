name: CI-Ledsflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  
  # --- VERIFICAÇÃO DO BOT (BAILEYS) ---
  job-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: leadsflow
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./bots/bot-wpp-balleys/package-lock.json

      - name: Install Dependencies
        run: |
          cd bots/bot-wpp-balleys
          npm install --legacy-peer-deps

      - name: Run Automated Tests (Jest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leadsflow
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: |
          cd bots/bot-wpp-balleys
          npm test

      - name: Check Code Syntax
        run: |
          cd bots/bot-wpp-balleys
          node --check index.js
          node --check Engine/whatsapp.js

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./bots/bot-wpp-balleys
          push: true
          tags: ghcr.io/fmzjuan/charlie-bot:latest